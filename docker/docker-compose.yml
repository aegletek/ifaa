version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: fraud-postgres
    restart: always
    environment:
      POSTGRES_DB: frauddb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  fraud-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-agent
    restart: always
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: ifaa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: manager
      

    volumes:
      - .:/app

volumes:
  postgres_data:
